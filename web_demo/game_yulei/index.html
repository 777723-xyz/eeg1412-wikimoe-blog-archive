<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>测试</title>
<style>
.canvas{
	border:1px solid #333;
	cursor:pointer;
}
</style>
</head>

<body>
<canvas id="myCanvas" class="canvas" onClick="init()"></canvas>
<div>分数：<span id="score"></span></div>
<div>HP：<span id="HP"></span></div>
<script>
var canvas=document.getElementById('myCanvas');
var scoreSpan = document.getElementById('score');
var HPSpan = document.getElementById('HP');
var ctx=canvas.getContext('2d');
var blockSize = 20;
var ctxH = 6;
var ctxW = 12;
canvas.width=ctxW*blockSize;
canvas.height=ctxH*blockSize;
var emt = "";
var boomT ="";
var creatEm = "";
var flush = "";

var myShipX=0;
var emShip = [];
var boom = [];
var hard = 0;
var score = 0;
var HP = 0;
var boomReload = true;

function init(){//初始化

	myShipX=3;//设定船的初始位置
	emShip = [];//清空敌舰数据
	boom = [];//清空鱼雷数据
	hard = 3000;//初始化难度
	score = 0;//初始化分数
	HP = 50;//初始化HP
	boomReload = true;//装载鱼雷初始化
	
	ctx.clearRect(0,0,canvas.width,canvas.height);
	
	creatEmShip();
	paintMyShip();
	paintEmship();
	scoreSpan.innerHTML = String(score);
	HPSpan.innerHTML = String(HP);
	
	clearInterval(emt);
	clearInterval(boomT);
	clearInterval(creatEm);
	clearInterval(flush);
	
	emt = setInterval(function(){
		emShipMove();
	},400);
	
	boomT = setInterval(function(){
		boomMove();
	},200);
	
	creatEm = setInterval(function(){
		creatEmShip();
	},hard);
	
	flush = setInterval(function(){
		ctx.clearRect(0,0,canvas.width,canvas.height);
		paintBoom();
		paintEmship();
		paintMyShip();
		boomEmship();
	},100);
	
}
function paintMyShip(){//画自己的船
	var shipX = (myShipX-1)*blockSize;
	ctx.fillStyle="#0075a9";
	ctx.fillRect(shipX+2,blockSize-10,blockSize-4,blockSize-10);
}
function creatEmShip(){//随机出现敌舰
	var Y = Math.floor(Math.random()*(ctxH-2) + 1);
	emShip.push([blockSize*ctxW,Y]);
}
function paintEmship(){//绘制敌舰
	for(var i=0;i<emShip.length;i++){
		var emShipX = emShip[i][0];
		var emShipY = (emShip[i][1]+1)*blockSize;
		ctx.fillStyle="#e60012";
		ctx.fillRect(emShipX+2,emShipY,blockSize-4,blockSize-10);
	}
	//console.log(emShip);
}
function emShipMove(){//移动敌舰
	for(let i=0;i<emShip.length;i++){
		var X = emShip[i][0]-blockSize;
		emShip[i][0] = X;
		
	}
	removeEmShip();
	//console.log(emShip);
}
function addBoom(){//增加鱼雷
	if(boomReload){
		var boomX = (myShipX-1)*blockSize;
		boom.push([boomX,blockSize,true]);
		boomReload = false;
		var boomT = setTimeout(function(){
			boomReload = true;
		},800);
	}
}
function paintBoom(){//绘制鱼雷
	for(let i=0;i<boom.length;i++){
		var boomX = boom[i][0];
		var boomY = boom[i][1];
		ctx.fillStyle="#6b6b6b";
		ctx.fillRect(boomX+7,boomY,blockSize-14,blockSize-10);
	}
}
function boomMove(){//鱼雷移动
	for(let i=0;i<boom.length;i++){
		if(boom[i][2]){
			boom[i][2] = false;
		}else{
			var Y = boom[i][1]+blockSize;
			boom[i][1] = Y
		}
	}
	removeBoom();
}
function removeBoom(){//移除鱼雷
	for(let i=0;i<boom.length;i++){
		var Y = boom[i][1];
		if(Y>ctxH*blockSize){
			boom.splice(i,1);
		}	
	}
}
function removeEmShip(){//超出范围删除敌舰
	for(let i=0;i<emShip.length;i++){
		var X = emShip[i][0];
		if(X<0){
			minusHP();
			emShip.splice(i,1);
			hard = hard+50;
			if(hard>=3000){
				hard=3000;
			}
		}
	}
}
function boomEmship(){//判定炸了
	for(let i=0;i<boom.length;i++){
		var boom_X = boom[i][0];
		var boom_Y = boom[i][1];
		for(let j=0;j<emShip.length;j++){
			var emShip_X = emShip[j][0];
			var emShip_Y = emShip[j][1];
			//console.log(emShip_X);
			if(boom_X===emShip_X){
				if(boom_Y===(emShip_Y+1)*blockSize){
					//console.log(boom_Y);
					//console.log(emShip_Y*blockSize);
					//console.log(boom_X);
					//console.log(emShip_X);
					boom.splice(i,1);
					emShip.splice(j,1);
					hard = hard-50;
					addScore();
					if(hard<=1200){
						hard=1200;
					}
					clearInterval(creatEm);
					creatEmShip();
					creatEm = setInterval(function(){
						creatEmShip();
					},hard);
				}
			}
		}
	}
}
function gameOver(){//游戏结束
	ctx.clearRect(0,0,canvas.width,canvas.height);
	clearInterval(emt);
	clearInterval(boomT);
	clearInterval(creatEm);
	clearInterval(flush);
	ctx.font = "14px Courier New";
	ctx.fillStyle = "#333";
	ctx.textAlign="center";
	ctx.fillText("游戏结束，你得了"+score+"分", Math.round(ctxW*blockSize/2), 50);
}
function addScore(){//加分
	score ++;
	scoreSpan.innerHTML = String(score);
}
function minusHP(){//减HP
	HP --;
	if(HP<=0){
		HPSpan.innerHTML = String(HP);
		setTimeout("gameOver()",0);
	}else{
		HPSpan.innerHTML = String(HP);
	}
}

document.onkeydown=function(event){
	var e = event || window.event || arguments.callee.caller.arguments[0];
	if(e && e.keyCode==37){//左
		if(myShipX===1){
			return
		}
		myShipX= myShipX-1;
	}
	if(e && e.keyCode==39){//右
		if(myShipX===ctxW){
			return
		}
		myShipX= myShipX+1;
	}
	if(e && e.keyCode==32){//空格
		addBoom();
		//console.log(boom);
	}
	
}
</script>



</body>
</html>
