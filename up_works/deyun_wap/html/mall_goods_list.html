<!--控制顶部的脚本-->
<script>
$(document).ready(function () {
	$('#open_search').click(function(){
		$('.deyun_common_tit_top_box.type_normal').hide();
		$('.deyun_common_tit_top_box.type_search').show();
	});
	$('#close_search').click(function(){
		$('.deyun_common_tit_top_box.type_normal').show();
		$('.deyun_common_tit_top_box.type_search').hide();
	});
	function top_search(){
	    var list_search_W = $(window).width()-(19+42+10);
	    $('.deyun_list_search_textfile_input').css('width',list_search_W-8);
	}
	top_search();
	$(window).resize(function(){
        top_search();
    });
});
</script>

<div class="index_go_top" id="top"></div>
<script>
	$(window).scroll(function(){
	var s=$(window).scrollTop();
		if(s>0){
		$("#top").css("display","block");
		}
		else{
		$("#top").css("display","none");
		}
	});
	 //当点击跳转链接后，回到页面顶部位置
	$("#top").click(function() {
        window.scrollTo(0,0);
    });
	
</script>
