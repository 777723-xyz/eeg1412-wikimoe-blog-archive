<script type="text/javascript">
    $(document).ready(function(){
            $('.account_tips').click(function(){
				$(this).parent().find(".input_txt").focus();
			})
            $("#focus .input_txt").each(function(){
                    var thisVal=$(this).val();
                    //判断文本框的值是否为空，有值的情况就隐藏提示语，没有值就显示
                    if(thisVal!=""){
                            $(this).siblings(".account_tips").hide();
                        }else{
                            $(this).siblings(".account_tips").show();
                        }
                    //聚焦型输入框验证  
                    $(this).focus(function(){
                            $(this).siblings(".account_tips").hide();
                        }).blur(function(){
                                var val=$(this).val();
                                if(val!=""){
                                    $(this).siblings(".account_tips").hide();
                                }else{
                                    $(this).siblings(".account_tips").show();
                                }   
                        });
                })
        })
</script>
<script>
$(document).ready(function () {
	
	
	$('.index_tab_btn').mouseenter(function() { 
	    $(this).addClass('tab_btn_hover');
		$(this).find('.tab_for_english').hide();
		$(this).find('.tab_for_chinese').show();
    });
	$('.index_tab_btn').mouseleave(function() { 
	    $(this).removeClass('tab_btn_hover');
		$(this).find('.tab_for_english').show();
		$(this).find('.tab_for_chinese').hide();
    });
	
	$('.tab_list_ul .index_tab_btn').mouseenter(function() { 
	    $(this).next().show();
    });
	$('.tab_list_ul .index_tab_btn').mouseleave(function() { 
	    $(this).next().hide();
    });
	
	
	$('.tab_list_ul .index_tab_lv2').mouseenter(function() { 
	    $(this).show().prev().addClass('tab_btn_hover');
		$(this).prev().find('.tab_for_english').hide();
		$(this).prev().find('.tab_for_chinese').show();
    });
	$('.tab_list_ul .index_tab_lv2').mouseleave(function() { 
	    $(this).hide().prev().removeClass('tab_btn_hover');
		$(this).prev().find('.tab_for_english').show();
		$(this).prev().find('.tab_for_chinese').hide();
    });
	
	
	$('.index_tab_btn').last().css('margin-right','0')
	$(".index_tab_lv2 .tab_lv2_li:last-child").find('.lv2_link').addClass("noborder")
	
	var winw = $(window).width()
	var winh = $(window).height()
	
	var emleft = (winw-300)/2
	var emtop = (winh-300)/2
	$('.weixin_qr_box').css('left',emleft).css('top',emtop)
	
	$(window).resize(function(){
     	var winw = $(window).width()
	    var winh = $(window).height()
	
	    var emleft = (winw-300)/2
	    var emtop = (winh-300)/2
	    $('.weixin_qr_box').css('left',emleft).css('top',emtop)
    });
	
	$('#winxin_open').click(function() { 
	    $('.weixin_qr_box').show();
	});
	$('#qr_close').click(function() { 
	    $('.weixin_qr_box').hide();
	});
});
</script>
