<script>
$(document).ready(function () {
	$('.hack_ten_bg').mouseenter(function() { 
	    $('.ten_bg').hide();
    });
	$('.hack_ten_bg').mouseleave(function() { 	    
		$('.ten_bg').show();
    });
	$('.maru_box').mouseenter(function() { 
	    $('.ten_bg').hide();
    });
	$('.maru_box').mouseleave(function() { 
	    $('.ten_bg').show();
    });
	$('.goga_banner').mouseenter(function() { 
	    $('.ten_bg').hide();
    });
	$('.goga_banner').mouseleave(function() { 
	    $('.ten_bg').show();
    });
	
	$('.index_tab_btn').mouseenter(function() { 
	    $(this).addClass('tab_btn_hover');
		$(this).find('.tab_for_english').hide();
		$(this).find('.tab_for_chinese').show();
    });
	$('.index_tab_btn').mouseleave(function() { 
	    $(this).removeClass('tab_btn_hover');
		$(this).find('.tab_for_english').show();
		$(this).find('.tab_for_chinese').hide();
    });
	
	$('.tab_list_ul .index_tab_btn').mouseenter(function() { 
	    $(this).next().show();
    });
	$('.tab_list_ul .index_tab_btn').mouseleave(function() { 
	    $(this).next().hide();
    });
	
	
	$('.tab_list_ul .index_tab_lv2').mouseenter(function() { 
	    $(this).show().prev().addClass('tab_btn_hover');
		$(this).prev().find('.tab_for_english').hide();
		$(this).prev().find('.tab_for_chinese').show();
    });
	$('.tab_list_ul .index_tab_lv2').mouseleave(function() { 
	    $(this).hide().prev().removeClass('tab_btn_hover');
		$(this).prev().find('.tab_for_english').show();
		$(this).prev().find('.tab_for_chinese').hide();
    });
	
	
	$('.index_tab_btn').last().css('margin-right','0')
	$(".index_tab_lv2 .tab_lv2_li:last-child").find('.lv2_link').addClass("noborder")
	
	var winw = $(window).width()
	var winh = $(window).height()
	
	var emleft = (winw-300)/2
	var emtop = (winh-300)/2
	$('.weixin_qr_box').css('left',emleft).css('top',emtop)
	
	$(window).resize(function(){
     	var winw = $(window).width()
	    var winh = $(window).height()
	
	    var emleft = (winw-300)/2
	    var emtop = (winh-300)/2
	    $('.weixin_qr_box').css('left',emleft).css('top',emtop)
    });
	
	$('#winxin_open').click(function() { 
	    $('.weixin_qr_box').show();
	});
	$('#qr_close').click(function() { 
	    $('.weixin_qr_box').hide();
	});
});
</script>
<script>
$(document).ready(function () {
    var speedtime= 7000;/*轮播速度1000=1秒*/
	opacityspeed= 2500;/*不透明度变化速度1000=1秒*/
    setautobanner = setInterval("autobanner()",speedtime)
	$('.goga_banner').first().stop(true,false).animate({opacity:'1'},1000);
	var maru = $('.maru')
    for(var i= 0,len=maru.length;i<len;i++){
        maru[i].index=i;
        maru[i].onclick=function(){
            iNow=this.index;
			setautobanner=window.clearInterval(setautobanner)
            banner();
			setautobanner = setInterval("autobanner()",speedtime)
        }
    }	

});

function autobanner(){
		var marunext = $('.maru').last().hasClass('active');
		if(marunext){
		    $('.maru').removeClass('active');
		    $('.maru').first().addClass('active');
		    $('.banner_box .goga_banner.active').stop(true,false).animate({opacity:'0'},opacityspeed);
		    $('.banner_box .goga_banner').removeClass('active');
		    $('.banner_box .goga_banner').first().addClass('active').stop(true,false).animate({opacity:'1'},opacityspeed);
		}
		else{
			var maruactive = $('.maru.active')
			var goga_banneractive = $('.banner_box .goga_banner.active')
		    $(maruactive).next().addClass('active');
			$(maruactive).removeClass('active');
		    $('.banner_box .goga_banner.active').stop(true,false).animate({opacity:'0'},opacityspeed);
		    $(goga_banneractive).removeClass('active');
		    $(goga_banneractive).next().addClass('active').stop(true,false).animate({opacity:'1'},opacityspeed);
		}
	}
function banner(){
		$('.maru').removeClass('active');
		$('.maru').eq(iNow).addClass('active');
		$('.banner_box .goga_banner.active').stop(true,false).animate({opacity:'0'},opacityspeed);
		$('.banner_box .goga_banner').removeClass('active');
		$('.banner_box .goga_banner').eq(iNow).addClass('active').stop(true,false).animate({opacity:'1'},opacityspeed);
		
	}
</script>
