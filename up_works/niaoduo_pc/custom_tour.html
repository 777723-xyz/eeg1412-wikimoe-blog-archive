   <div class="niaoduo_cut_body">
      <div class="fl niaoduo_cut_left_box">
         <div class="niaoduo_cut_yellow_tips_box">
            <div class="niaoduo_cut_yellow_tips_sj"></div>
            <p class="niaoduo_cut_yellow_tips_txt">1.您计划什么时候出行呢？想玩几天（从国内出发至回国的总天数）</p>
         </div>
         
         <div class="niaoduo_cut_left_down_body">
            <form>
               <div class="niaoduo_cut_left_down_sel_item">
                   <label class="niaoduo_cut_left_down_sel_label">出行时间</label>
                   <select class="niaoduo_cut_left_down_sel" name="">
                      <option value="">年份</option>
	                  <option value="">2016年</option>
	                  <option value="">2017年</option>
	               </select>
                   <select class="niaoduo_cut_left_down_sel" name="">
                      <option value="">月份</option>
	                  <option value="">1月</option>
	                  <option value="">2月</option>
	               </select>
                   <select class="niaoduo_cut_left_down_sel" name="">
                      <option value="">日期</option>
	                  <option value="">1日</option>
	                  <option value="">2日</option>
	               </select>
               </div>
               
               <div class="niaoduo_cut_left_down_sel_item">
                   <label class="niaoduo_cut_left_down_sel_label">旅行天数</label>
                   <select class="niaoduo_cut_left_down_sel" name="">
                      <option value="">选择旅行天数</option>
	                  <option value="">1天</option>
	                  <option value="">2天</option>
	               </select>
                   
               </div>
               
               <div class="niaoduo_cut_left_down_sel_item">
                 <div class="niaoduo_cut_left_down_sel_radio_box">
                   <input type="radio" class="niaoduo_cut_left_down_sel_radio" id="sel_1" name="days_r" />
                   <label class="niaoduo_cut_left_down_sel_label for_radio" for="sel_1">可根据行程安排增减1-2天</label> 
                 </div>
                 <div class="niaoduo_cut_left_down_sel_radio_box">
                   <input type="radio" class="niaoduo_cut_left_down_sel_radio" id="sel_2" name="days_r" />
                   <label class="niaoduo_cut_left_down_sel_label for_radio" for="sel_2">天数确定，不能更改</label>
                 </div>       
               </div>
               <div class="niaoduo_cut_next_pre_body">
                  <!--<button type="button" class="niaoduo_cut_q_pre">上一问</button>-->
                  <button type="button" class="niaoduo_cut_q_next">确定，进入下一题</button> 
               </div> 
            </form>
         </div>
      </div>
      
      <div class="fr niaoduo_cut_right_box">

               </div>

            </li>
            <li class="niaoduo_cut_right_tips_li">
