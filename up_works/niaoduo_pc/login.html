<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
<meta name="keywords" content="鸟多旅游" />
<meta name="description" content="鸟多旅游" /> 
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>登录</title>
<!--通用脚本和样式表-->
<link href="css/niaoduo_common.css" rel="stylesheet" type="text/css" />
<script src="js/jquery-1.9.1.min.js"></script>
<script src="js/niaoduo_common.js"></script>
<script src="js/niaoduo_scroll.js"></script>

<!--非通用脚本和样式表-->
<script src="js/niaoduo_opcity_header.js"></script>
<link href="css/niaoduo_account.css" rel="stylesheet" type="text/css" />
</head>

<body>
<div class="niaoduo_common_header">
  <div class="niaoduo_layout">
      <div class="fl niaoduo_header_logo">
         <a href="#" class="niaoduo_header_logo_link"></a>
     </div>
      <div class="fl">
         <ul class="niaoduo_header_meanu_ul">
            <li class="niaoduo_header_meanu_li">
               <a href="#" class="niaoduo_header_meanu_link">目的地</a>
               <i class="niaoduo_header_meanu_bar">/</i>
            </li>
            <li class="niaoduo_header_meanu_li">
               <a href="#" class="niaoduo_header_meanu_link">主题游</a>
               <i class="niaoduo_header_meanu_bar">/</i>
            </li>
            <li class="niaoduo_header_meanu_li">
               <a href="#" class="niaoduo_header_meanu_link">定制游</a>
               <i class="niaoduo_header_meanu_bar">/</i>
            </li>
            <li class="niaoduo_header_meanu_li">
               <a href="#" class="niaoduo_header_meanu_link">自由行</a>
               <i class="niaoduo_header_meanu_bar">/</i>
            </li>
            <li class="niaoduo_header_meanu_li">
               <a href="#" class="niaoduo_header_meanu_link">白菜价</a>
               <i class="niaoduo_header_meanu_bar">/</i>
            </li>
         </ul>
      </div>
      
    <div class="fr niaoduo_header_buy_cart">
         <a class="niaoduo_header_buy_cart_link" href="#">
            <span class="niaoduo_header_buy_cart_span">购物车：<span class="niaoduo_header_buy_cart_num">6</span>件</span>
         </a>
      </div>
      <!--登录前-->
    <div class="fr niaoduo_header_account_body">
         <a href="#">登录</a>
         <i>|</i>
         <a href="#">注册</a>
      </div>
      <!--登录后-->
      <!--<div class="fr niaoduo_header_account_body">
         <a href="#">1235454545454</a>
      </div>-->
       
    <div class="fr niaoduo_header_search_body">
         <input class="niaoduo_header_input_search" type="text" name="search[name]" id="search_keywords" placeholder="">
         <button type="button" class="niaoduo_header_btn_search" id="btn_search"></button>
      </div>   
  </div>
</div>

<div class="niaoduo_account_body">
   <div class="niaoduo_layout">
      <div class="niaoduo_account_white_bg">
         <div class="niaoduo_account_tit type_1">登录</div>
         <form method="post">
         <div class="niaoduo_account_input_item">
            <div class="niaoduo_account_input_name">
               <div class="fl">登录账号</div>
               <div class="fr"><a class="niaoduo_account_go_link" href="#">用户注册<i class="niaoduo_account_go_link_ico"></i></a></div>
            </div>
            <div class="niaoduo_account_input">
               <input type="text" class="niaoduo_account_input_txt" name="mobile" value="" autofocus="autofocus"  placeholder="用户名/手机号/邮箱">
            </div>
         </div>
         
         <div class="niaoduo_account_input_item">
            <div class="niaoduo_account_input_name">
               <div class="fl">密码</div>  
            </div>
            <div class="niaoduo_account_input">
               <input type="password" class="niaoduo_account_input_txt" name="password" value="" placeholder="请填写密码">
            </div>
         </div>
         
         <div class="niaoduo_account_input_item">
            <div class="niaoduo_account_input_name">
               <div class="fl">验证码</div>  
            </div>
           <div class="niaoduo_account_input type_sm">
               <input type="text" class="niaoduo_account_input_txt" name="captcha" value="" autocomplete="off"  placeholder=""><span class="niaoduo_capchadiv"><img src="images/yanzhengma.png"id="captcha" height="53" /></span>
               <span class="niaoduo_reload_captcha">看不清？点图片更换！</span>
            </div>
         </div>
         
         <div class="niaoduo_account_input_item type_check">
         <div class="fl">
            <label class="niaoduo_account_check_label">
               <input type="checkbox" name="is_remember" class="niaoduo_account_check" value="1">
               <span class="niaoduo_account_check_txt">自动登录</span>
            </label>
            <span class="niaoduo_account_check_txt2">公共电脑上慎用</span>
         </div>
         <div class="fr">
            <a href="#" class="niaoduo_account_link2">忘记密码？</a>
         </div>
         </div>
         
         <div class="niaoduo_account_send_btn_box">
            <button class="niaoduo_account_login_btn" id="login" type="button">登录</button>
         </div>
         
         </form>
         
      </div>
   </div>
</div>

<div class="niaoduo_common_footer">
   <div class="niaoduo_layout">
      <div class="fl niaoduo_common_footer_left">
         <p class="niaoduo_common_footer_link">
            <a href="#">关于鸟多</a>
            <i>|</i>
            <a href="#">会员制度</a>
            <i>|</i>
            <a href="#">退款政策</a>
            <i>|</i>
            <a href="#">免责声明</a>
         </p>
         <p class="niaoduo_common_footer_txt">温州和平国际旅游有限公司  旗下电商品牌</p>
      </div>
      <div class="fr niaoduo_common_footer_right">
         <p>版权所有 2016 © niaoduo.com 浙ICP备09067728号-3</p>
      </div>
   </div>
</div>
</body>
</html>
